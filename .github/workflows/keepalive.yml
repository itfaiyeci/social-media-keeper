name: Sosyal Medya Canlı Tutma Botu

on:
  schedule:
    - cron: '0 */12 * * *'  # Her 12 saatte bir çalışır
  workflow_dispatch:        # Manuel çalıştırmak için

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Bağımlılıkları Yükle
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps
      
      - name: Botu Çalıştır
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FACEBOOK_EMAIL: ${{ secrets.FACEBOOK_EMAIL }}
          FACEBOOK_PASSWORD: ${{ secrets.FACEBOOK_PASSWORD }}
          YOUTUBE_EMAIL: ${{ secrets.YOUTUBE_EMAIL }}
          YOUTUBE_PASSWORD: ${{ secrets.YOUTUBE_PASSWORD }}
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
          TIKTOK_USERNAME: ${{ secrets.TIKTOK_USERNAME }}
          TIKTOK_PASSWORD: ${{ secrets.TIKTOK_PASSWORD }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          CHECK_INTERVAL_HOURS: 12
        run: python main.py
